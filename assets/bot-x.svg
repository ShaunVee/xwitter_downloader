<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="justthefile for X">
  <title>justthefile for X</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#20262e"/>
      <stop offset="1" stop-color="#0a0d11"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c7d3e1"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#bg)"/>

  <!-- The bot marks are a set: same silhouette as assets/logo.svg, with the
       arrow drawn in the platform's colour instead of knocked out. That one
       change is what separates a bot avatar from the site's own mark, which
       stays unclaimed by any single platform.

       X's brand colour is black, which would vanish into this plate, so this
       one takes the project indigo: already the fold colour on the base mark,
       so it reads as continuity rather than an arbitrary pick. Against
       Reddit's orange it's unmistakable in a chat list at 32px, which is the
       only place these two are ever seen side by side.

       Deliberately no X glyph: the avatar of a third-party downloader
       shouldn't wear someone else's trademark. -->
  <path fill="url(#page)" d="
    M148 96 h132 l84 84 v236 a28 28 0 0 1 -28 28 h-188 a28 28 0 0 1 -28 -28 v-292 a28 28 0 0 1 28 -28 z"/>

  <path fill="#6366f1" d="
    M232 196 h48 a12 12 0 0 1 12 12 v76 h34 a10 10 0 0 1 7.6 16.5 l-58 66 a10 10 0 0 1 -15.2 0 l-58 -66 a10 10 0 0 1 7.6 -16.5 h34 v-76 a12 12 0 0 1 12 -12 z"/>

  <!-- Folded corner, as on the base mark, in the same platform colour. -->
  <path fill="#6366f1" d="M280 96 l84 84 h-60 a24 24 0 0 1 -24 -24 z"/>
</svg>
