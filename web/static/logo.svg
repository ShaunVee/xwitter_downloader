<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="justthefile">
  <title>justthefile</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#20262e"/>
      <stop offset="1" stop-color="#0a0d11"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c7d3e1"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#bg)"/>

  <!-- No platform glyph, deliberately: the mark has to outlive the app being
       X-only. A page with the arrow knocked out of it as negative space says
       "just the file" without naming a source, needs one fill to draw, and
       still reads at 32px where a wordmark turns to mush. -->
  <path fill="url(#page)" fill-rule="evenodd" d="
    M148 96 h132 l84 84 v236 a28 28 0 0 1 -28 28 h-188 a28 28 0 0 1 -28 -28 v-292 a28 28 0 0 1 28 -28 z
    M232 196 h48 a12 12 0 0 1 12 12 v76 h34 a10 10 0 0 1 7.6 16.5 l-58 66 a10 10 0 0 1 -15.2 0 l-58 -66 a10 10 0 0 1 7.6 -16.5 h34 v-76 a12 12 0 0 1 12 -12 z"/>

  <!-- Folded corner carries the brand colour, so the mark is not pure greyscale. -->
  <path fill="#6366f1" d="M280 96 l84 84 h-60 a24 24 0 0 1 -24 -24 z"/>
</svg>
